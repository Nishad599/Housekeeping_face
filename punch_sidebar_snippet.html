<!-- ═══════════════════════════════════════════════════════════════════
  TODAY'S ATTENDANCE SIDEBAR — for punch.html (kiosk page)

  HOW TO ADD:
  1. Wrap your existing punch/camera content and this sidebar in a flex row.
     If your punch.html has a main container like <div class="punch-container">,
     change your layout to:

        <div style="display:flex; gap:16px; align-items:flex-start;">
            <div style="flex:1;">  ... your existing camera/punch UI ...  </div>
            <!-- paste the <aside> below as the second child -->
        </div>

  2. Paste the <aside> block + <script> anywhere inside <body>.
  It calls the new PUBLIC endpoint /api/attendance/today-board (no login needed)
  and refreshes every 30 seconds + immediately after each successful punch
  (listen for your punch success handler and call refreshTodayBoard()).
═══════════════════════════════════════════════════════════════════ -->

<aside id="today-board" style="
    width: 300px; max-height: 78vh; overflow-y: auto;
    background: #fff; border: 1px solid #e3e6ea; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 14px;
    font-family: inherit;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <h3 style="margin:0; font-size:15px; color:#2c3e50;">✅ Punched Today</h3>
    <span id="tb-count" style="background:#2c3e50; color:#fff; border-radius:12px;
          padding:2px 10px; font-size:12px; font-weight:600;">0</span>
  </div>
  <div id="tb-list" style="font-size:13px;">
    <p style="color:#95a5a6; text-align:center; margin:20px 0;">Loading…</p>
  </div>
</aside>

<script>
async function refreshTodayBoard() {
  try {
    const res = await fetch('/api/attendance/today-board');
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('tb-count').textContent = data.count;
    const list = document.getElementById('tb-list');
    if (!data.entries.length) {
      list.innerHTML = '<p style="color:#95a5a6;text-align:center;margin:20px 0;">No punches yet today</p>';
      return;
    }
    list.innerHTML = data.entries.map(e => `
      <div style="display:flex; justify-content:space-between; align-items:center;
                  padding:7px 4px; border-bottom:1px solid #f0f2f4;">
        <span style="font-weight:600; color:#34495e; max-width:140px; overflow:hidden;
                     text-overflow:ellipsis; white-space:nowrap;">${e.name}</span>
        <span style="text-align:right; line-height:1.35;">
          <span style="color:#27ae60;">IN ${e.punch_in || '—'}</span><br>
          <span style="color:${e.punch_out ? '#c0392b' : '#bdc3c7'};">
            ${e.punch_out ? 'OUT ' + e.punch_out : 'not out yet'}
          </span>
        </span>
      </div>`).join('');
  } catch (err) { console.error('today-board refresh failed', err); }
}

refreshTodayBoard();
setInterval(refreshTodayBoard, 30000);   // auto-refresh every 30s

/* IMPORTANT: in your existing punch-success handler (where you show the
   "Punch IN recorded" message after calling /api/attendance/punch),
   add one line so the board updates instantly:
       refreshTodayBoard();
*/
</script>

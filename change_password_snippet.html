<!-- ═══════════════════════════════════════════════════════════════════
  CHANGE PASSWORD MODAL — paste into dashboard.html (or a settings page)

  1. Add a trigger somewhere in your navbar/menu:
       <a href="#" onclick="openPwdModal(); return false;">🔑 Change Password</a>
  2. Paste the modal + script below anywhere inside <body>.
  Calls POST /api/auth/change-password (uses the login cookie automatically).
  Admin can also reset other users via POST /api/auth/reset-password/{username}.
═══════════════════════════════════════════════════════════════════ -->

<div id="pwd-modal" style="display:none; position:fixed; inset:0;
     background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:24px; width:360px;
              box-shadow:0 10px 30px rgba(0,0,0,.2);">
    <h3 style="margin:0 0 16px; color:#2c3e50;">Change Password</h3>

    <label style="font-size:13px; color:#555;">Current password</label>
    <input id="pwd-old" type="password" autocomplete="current-password"
           style="width:100%; padding:9px; margin:4px 0 12px; border:1px solid #ccd1d6; border-radius:8px;">

    <label style="font-size:13px; color:#555;">New password (min 8 characters)</label>
    <input id="pwd-new" type="password" autocomplete="new-password"
           style="width:100%; padding:9px; margin:4px 0 12px; border:1px solid #ccd1d6; border-radius:8px;">

    <label style="font-size:13px; color:#555;">Confirm new password</label>
    <input id="pwd-confirm" type="password" autocomplete="new-password"
           style="width:100%; padding:9px; margin:4px 0 6px; border:1px solid #ccd1d6; border-radius:8px;">

    <p id="pwd-msg" style="min-height:18px; font-size:13px; margin:6px 0;"></p>

    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button onclick="closePwdModal()" style="padding:8px 16px; border:1px solid #ccd1d6;
              background:#fff; border-radius:8px; cursor:pointer;">Cancel</button>
      <button onclick="submitPwdChange()" style="padding:8px 16px; border:none;
              background:#2c3e50; color:#fff; border-radius:8px; cursor:pointer;">Update</button>
    </div>
  </div>
</div>

<script>
function openPwdModal()  { document.getElementById('pwd-modal').style.display = 'flex'; }
function closePwdModal() {
  document.getElementById('pwd-modal').style.display = 'none';
  ['pwd-old','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pwd-msg').textContent = '';
}

async function submitPwdChange() {
  const msg = document.getElementById('pwd-msg');
  const oldP = document.getElementById('pwd-old').value;
  const newP = document.getElementById('pwd-new').value;
  const conf = document.getElementById('pwd-confirm').value;

  if (newP.length < 8) { msg.style.color = '#c0392b'; msg.textContent = 'New password must be at least 8 characters.'; return; }
  if (newP !== conf)   { msg.style.color = '#c0392b'; msg.textContent = 'Passwords do not match.'; return; }

  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_password: oldP, new_password: newP })
    });
    const data = await res.json();
    if (res.ok) {
      msg.style.color = '#27ae60';
      msg.textContent = data.message;
      setTimeout(() => { window.location.href = '/login'; }, 1500);  // re-login with new password
    } else {
      msg.style.color = '#c0392b';
      msg.textContent = data.detail || 'Failed to change password.';
    }
  } catch (e) {
    msg.style.color = '#c0392b';
    msg.textContent = 'Network error — try again.';
  }
}
</script>

name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/user1/Final_house/face-attendance
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd /home/user1/Final_house/face-attendance
          source venv/bin/activate
          pip install -r requirements.txt --quiet

      - name: Restart application
        run: |
          # Restart the systemd service instead of using nohup
          sudo systemctl restart face-attendance
          
          # Optional: check status to ensure it didn't crash
          sleep 3
          sudo systemctl is-active --quiet face-attendance || (sudo journalctl -u face-attendance -n 20 && exit 1)

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punch Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0d2854;
            --blue: #1a6fc4;
            --sky: #3b9edd;
            --accent: #4ab3f4;
            --bg: #dff0fb;
            --card: #ffffff;
            --text: #0d2854;
            --muted: #6b7fa3;
            --border: rgba(13, 40, 84, 0.08);
            --shadow: 0 20px 60px rgba(13, 40, 84, 0.10);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 100;
        }

        .back-link:hover {
            color: var(--navy);
        }

        /* Main card */
        .punch-card {
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px 40px 32px;
            width: 100%;
            max-width: 1080px;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.3px;
        }

        .clock {
            font-family: 'DM Mono', monospace;
            font-size: 38px;
            font-weight: 500;
            color: var(--navy);
            margin-top: 6px;
            letter-spacing: -1px;
        }

        .date-line {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Body layout */
        .punch-area {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        /* Camera */
        .camera-wrap {
            flex: 1 1 0;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #e8f4fc;
            min-height: 460px;
            max-height: 520px;
        }

        .camera-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
        }

        canvas {
            display: none;
        }

        /* Oval overlay */
        .face-oval {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .face-oval::after {
            content: '';
            width: 220px;
            height: 270px;
            border: 2px dashed rgba(59, 158, 221, 0.55);
            border-radius: 50%;
        }

        /* Right pane */
        .side-pane {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Stat cards */
        .stat-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-radius: 16px;
            background: #f4f9fe;
            border: 1px solid var(--border);
        }

        .stat-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #daeef9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--blue);
        }

        /* SVG icon replacements */
        .stat-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--blue);
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.5px;
        }

        /* Punch button */
        .punch-btn {
            margin-top: 4px;
            width: 100%;
            height: 90px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(160deg, var(--sky) 0%, var(--blue) 100%);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 12px 32px rgba(26, 111, 196, 0.30);
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .punch-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(26, 111, 196, 0.38);
        }

        .punch-btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: none;
        }

        .punch-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* Result */
        #result {
            width: 100%;
        }

        .result-box {
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
        }

        .result-box.success {
            background: rgba(5, 150, 105, 0.10);
            border: 1px solid #059669;
            color: #065f46;
        }

        .result-box.error {
            background: rgba(220, 38, 38, 0.10);
            border: 1px solid #dc2626;
            color: #7f1d1d;
        }

        .result-name {
            font-size: 16px;
            font-weight: 700;
        }

        .result-detail {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Footer */
        .punch-footer {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 28px;
        }

        /* Overlay */
        #punch-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(8px);
            animation: overlayIn 0.25s ease;
        }

        #punch-overlay.show {
            display: flex;
        }

        @keyframes overlayIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #punch-overlay.success-overlay {
            background: rgba(5, 150, 105, 0.92);
        }

        #punch-overlay.error-overlay {
            background: rgba(185, 28, 28, 0.92);
        }

        .overlay-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: iconPop 0.3s ease 0.1s both;
        }

        @keyframes iconPop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .overlay-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.4rem;
        }

        .overlay-detail {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.88);
            text-align: center;
            max-width: 360px;
            line-height: 1.5;
        }

        .overlay-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: rgba(255, 255, 255, 0.55);
            width: 100%;
            transform-origin: left;
            animation: barShrink linear forwards;
        }

        @keyframes barShrink {
            from {
                transform: scaleX(1)
            }

            to {
                transform: scaleX(0)
            }
        }

        /* Responsive */
        @media (max-width: 820px) {
            .punch-area {
                flex-direction: column;
            }

            .camera-wrap {
                min-height: 300px;
            }

            .side-pane {
                flex: none;
                width: 100%;
            }

            .punch-btn {
                height: 64px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <a href="/" class="back-link">‹ Back</a>

    <!-- Result Overlay -->
    <div id="punch-overlay">
        <div class="overlay-icon" id="overlay-icon"></div>
        <div class="overlay-name" id="overlay-name"></div>
        <div class="overlay-detail" id="overlay-detail"></div>
        <div class="overlay-bar" id="overlay-bar"></div>
    </div>

    <div class="punch-card">

        <!-- Header -->
        <div class="card-header">
            <h1>Face Attendance</h1>
            <div class="clock" id="clock">--:--:--</div>
            <div class="date-line" id="dateDisplay">Loading date…</div>
        </div>

        <!-- Body -->
        <div class="punch-area">

            <!-- Camera -->
            <div class="camera-wrap">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <div class="face-oval"></div>
            </div>

            <!-- Side pane -->
            <div class="side-pane">

                <div class="stat-card">
                    <div class="stat-left">
                        <div class="stat-icon">
                            <!-- people icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                            </svg>
                        </div>
                        <span class="stat-label">Total Staff</span>
                    </div>
                    <div class="stat-value" id="statTotalStaff">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-left">
                        <div class="stat-icon">
                            <!-- check-circle icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                            </svg>
                        </div>
                        <span class="stat-label">Present Today</span>
                    </div>
                    <div class="stat-value" id="statPresentToday">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-left">
                        <div class="stat-icon">
                            <!-- clock icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z" />
                            </svg>
                        </div>
                        <span class="stat-label">Last Punch</span>
                    </div>
                    <div class="stat-value" id="statLastPunch" style="font-size:16px;">-</div>
                </div>

                <button class="punch-btn" id="punchBtn" disabled>PUNCH</button>

                <div id="result"></div>
            </div>
        </div>

        <div class="punch-footer">© 2026 Mumbai • AI Powered Attendance System</div>
    </div>

    <script>
        // ── Audio ──────────────────────────────────────────────────────────
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSuccessTone() {
            [[523, 0], [659, 0.12], [784, 0.24]].forEach(([freq, delay]) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                const t = audioCtx.currentTime + delay;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                osc.start(t); osc.stop(t + 0.6);
            });
        }

        function playFailureTone() {
            [[233, 0], [196, 0.25]].forEach(([freq, delay]) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; osc.frequency.value = freq;
                const t = audioCtx.currentTime + delay;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                osc.start(t); osc.stop(t + 0.22);
            });
        }

        // ── Overlay ────────────────────────────────────────────────────────
        const overlay = document.getElementById('punch-overlay');
        const overlayIcon = document.getElementById('overlay-icon');
        const overlayName = document.getElementById('overlay-name');
        const overlayDetail = document.getElementById('overlay-detail');
        const overlayBar = document.getElementById('overlay-bar');
        let overlayTimer = null;

        function showOverlay(type, icon, name, detail, duration = 4000) {
            if (overlayTimer) clearTimeout(overlayTimer);
            overlay.className = 'show ' + (type === 'success' ? 'success-overlay' : 'error-overlay');
            overlayIcon.textContent = icon;
            overlayName.textContent = name;
            overlayDetail.textContent = detail;
            overlayBar.style.animation = 'none';
            overlayBar.offsetHeight;
            overlayBar.style.animation = `barShrink ${duration}ms linear forwards`;
            overlayTimer = setTimeout(() => { overlay.className = ''; }, duration);
        }
        overlay.addEventListener('click', () => {
            if (overlayTimer) clearTimeout(overlayTimer);
            overlay.className = '';
        });

        // ── Clock ──────────────────────────────────────────────────────────
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            const el = document.getElementById('dateDisplay');
            if (el) el.textContent = now.toLocaleDateString('en-IN', {
                weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── Camera ─────────────────────────────────────────────────────────
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const punchBtn = document.getElementById('punchBtn');
        const resultDiv = document.getElementById('result');

        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                resultDiv.innerHTML = `<div class="result-box error">Camera unsupported on this browser/connection.</div>`;
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                punchBtn.disabled = false;
            } catch (err) {
                resultDiv.innerHTML = `<div class="result-box error">Camera access denied: ${err.message}</div>`;
            }
        }

        function captureFrame() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            return new Promise(resolve => canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.9));
        }

        // ── Punch ──────────────────────────────────────────────────────────
        async function doPunch() {
            punchBtn.disabled = true;
            punchBtn.textContent = 'Processing…';
            resultDiv.innerHTML = '';
            try {
                const blob = await captureFrame();
                const fd = new FormData();
                fd.append('face_image', blob, 'face.jpg');

                const res = await fetch('/api/attendance/punch', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    const timeStr = data.punch_time
                        ? new Date(data.punch_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true })
                        : '';
                    playSuccessTone();
                    showOverlay('success', '✅', data.employee_name || 'Punch Recorded',
                        `${data.punch_type} at ${timeStr}\nID: ${data.employee_id || ''} | Confidence: ${((data.confidence || 0) * 100).toFixed(1)}%`);
                    resultDiv.innerHTML = `
                    <div class="result-box success">
                        <div class="result-name">${data.employee_name || ''}</div>
                        <div class="result-detail">${data.punch_type} recorded at ${timeStr}</div>
                        <div class="result-detail">ID: ${data.employee_id || ''}</div>
                    </div>`;
                } else {
                    playFailureTone();
                    showOverlay('error', '❌', 'Punch Failed', data.message || 'Unknown error');
                    resultDiv.innerHTML = `
                    <div class="result-box error">
                        <div class="result-name">Punch Failed</div>
                        <div class="result-detail">${data.message || 'Unknown error'}</div>
                    </div>`;
                }
            } catch (err) {
                playFailureTone();
                showOverlay('error', '⚠️', 'Network Error', err.message);
                resultDiv.innerHTML = `<div class="result-box error">Network error: ${err.message}</div>`;
            }
            punchBtn.textContent = 'PUNCH';
            setTimeout(() => { punchBtn.disabled = false; }, 2000);
            setTimeout(() => { resultDiv.innerHTML = ''; }, 8000);
            loadPunchStats();
        }

        punchBtn.addEventListener('click', doPunch);
        startCamera();

        // ── Stats ──────────────────────────────────────────────────────────
        async function loadPunchStats() {
            try {
                const today = new Date().toISOString().slice(0, 10);

                const staffRes = await fetch('/api/staff/?active_only=true');
                const staff = await staffRes.json();
                document.getElementById('statTotalStaff').textContent = staff.length || 0;

                const presentRes = await fetch('/api/attendance/today');
                const present = await presentRes.json();
                document.getElementById('statPresentToday').textContent = present.length || 0;

                const punchesRes = await fetch(`/api/attendance/punches?date_str=${today}`);
                const punches = await punchesRes.json();
                if (punches && punches.length) {
                    const t = new Date(punches[0].punch_time);
                    document.getElementById('statLastPunch').textContent =
                        t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
                } else {
                    document.getElementById('statLastPunch').textContent = '-';
                }
            } catch (e) {
                console.warn('Stats load failed', e);
            }
        }
        loadPunchStats();
    </script>
</body>

</html>

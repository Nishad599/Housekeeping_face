<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Attendance System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root{ --bgA:#eef2ff; --bgB:#f8fafc; --primary:#2563EB; --primaryDark:#1D4ED8; --muted:#64748B }
        body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--bgA),var(--bgB)); font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,Arial }
        .center-card{ width:420px; background:#fff; border-radius:18px; padding:28px; box-shadow:0 20px 40px rgba(0,0,0,0.08); text-align:center; animation:fadeIn 0.6s ease }
        @keyframes fadeIn{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
        .top-brand{ position:fixed; top:18px; left:18px; color:var(--primary); font-weight:700; font-size:13px }
        h1{ font-size:28px; margin:0 0 8px 0; color:#0F172A; font-weight:700 }
        .subtitle{ font-size:14px; color:var(--muted); margin:0 0 18px 0 }
        .btn-primary{ display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; border-radius:10px; background:var(--primary); color:#fff; font-weight:600; font-size:16px; text-decoration:none; box-shadow:0 8px 18px rgba(37,99,235,0.25) }
        .btn-primary:hover{ background:var(--primaryDark); transform:translateY(-2px) }
        .btn-secondary{ display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; border-radius:10px; background:#F1F5F9; color:#0F172A; border:1px solid #E2E8F0; font-weight:600; text-decoration:none }
        .btn-secondary:hover{ background:#E2E8F0 }
        .footer{ margin-top:12px; font-size:12px; color:#94A3B8 }
    </style>
</head>
<body>
    <div class="top-brand">Smart Attendance System</div>
    <div class="center-card">
        <h1>Face Attendance System</h1>
        <div class="subtitle">Smart AI-Powered Staff Attendance</div>

        <a href="/punch" class="btn-primary">📷 Punch Attendance</a>
        <div style="height:12px"></div>
        <a href="/login" class="btn-secondary">🛠 Admin Login</a>

        <div class="footer">© 2026 Mumbai • AI Powered Attendance System</div>
    </div>
</body>
</html>

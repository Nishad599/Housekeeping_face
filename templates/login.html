<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Face Attendance</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Face Attendance</h1>
            <p class="subtitle">Sign in to manage attendance</p>

            <div id="alert-area"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password">
            </div>

            <button id="loginBtn" class="btn btn-primary btn-lg" style="width:100; margin-top:0.5rem;">
                Sign In
            </button>

            <p class="text-center text-muted mt-2" style="font-size:0.8rem;">
                Default: admin / admin123
            </p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // Server handles redirection if already logged in

        async function doLogin() {
            const username = $('#username').value.trim();
            const password = $('#password').value.trim();
            if (!username || !password) {
                showAlert($('#alert-area'), 'Enter username and password', 'danger');
                return;
            }
            try {
                $('#loginBtn').textContent = 'Signing in...';
                await API.login(username, password);
                window.location.href = '/dashboard';
            } catch (e) {
                showAlert($('#alert-area'), e.message, 'danger');
                $('#loginBtn').textContent = 'Sign In';
            }
        }

        $('#loginBtn').addEventListener('click', doLogin);
        $('#password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        $('#username').addEventListener('keydown', e => { if (e.key === 'Enter') $('#password').focus(); });
    </script>
</body>

</html>
